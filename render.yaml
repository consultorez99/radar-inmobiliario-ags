# OJO: este archivo solo aplica si el servicio está gestionado por Blueprint
# (New + → Blueprint sobre el repo; adopta el servicio existente por `name`).
# Un Static Site creado a mano en el dashboard lo ignora — autodeploya desde
# GitHub pero NO aplica `headers` ni `routes`. Ver "Despliegue" en README.md.
services:
  - type: web
    name: radar-inmobiliario-ags
    runtime: static
    staticPublishPath: .
    buildCommand: ""
    routes:
      # Redirect (no rewrite) para que la URL quede en /web/ y así los assets
      # relativos (styles.css, main.js, fetch("../data/...")) resuelvan bien.
      - type: redirect
        source: /
        destination: /web/
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
